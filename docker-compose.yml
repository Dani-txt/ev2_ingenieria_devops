version: '3.8'

# Docker Compose - saludo-service (IE5)
# Orquestación: app Spring Boot + Nginx como proxy inverso

services:
  # Servicio 1: Microservicio Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saludo-app
    ports:
      - "8080:8080"
    networks:
      - backend
    volumes:
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # Servicio 2: Nginx como proxy inverso
  nginx:
    image: nginx:1.25-alpine
    container_name: saludo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  app-logs:
